services:
  - type: web
    name: sovereon-backend
    runtime: node
    region: oregon
    plan: standard
    autoDeploy: true
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm run start:with-migrate
    healthCheckPath: /api/health
    numInstances: 1
    env: node
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: sovereon-db
          property: connectionString
      # Admin Session Secret (Required for admin panel login)
      - key: SESSION_SECRET
        generateValue: true
      # Email Configuration (Resend API - Required for contact form)
      - key: RESEND_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: FROM_EMAIL
        value: Sovereon <partners@sovereon.online>
      - key: ADMIN_EMAIL
        value: partners@sovereon.online
      # CORS Configuration
      - key: FRONTEND_URL
        value: https://sovereon.vercel.app
      # Logging
      - key: LOG_LEVEL
        value: info

databases:
  - name: sovereon-db
    databaseName: sovereon
    plan: standard
    region: oregon
