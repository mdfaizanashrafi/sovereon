services:
  - type: web
    name: sovereon-backend
    runtime: node
    region: oregon
    plan: standard
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: sovereon-db
          property: connectionString
      # Admin Session Secret (Required for admin panel login)
      - key: SESSION_SECRET
        generateValue: true
      # Email Configuration (Required for contact form)
      - key: SMTP_HOST
        value: smtp.zoho.in
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: partners@sovereon.online
      - key: SMTP_PASSWORD
        sync: false  # Set this manually in Render dashboard
      - key: SMTP_FROM
        value: Sovereon <partners@sovereon.online>
      # CORS Configuration
      - key: FRONTEND_URL
        value: https://sovereon.vercel.app
      # Logging
      - key: LOG_LEVEL
        value: info

databases:
  - name: sovereon-db
    databaseName: sovereon
    plan: standard
    region: oregon
